name:                piper-reader
version:             0.1.0.0
github:              "user/piper-reader"
license:             MIT
author:              "Nathan"
maintainer:          "nathan@example.com"
copyright:           "2026 Nathan"

extra-source-files:
- README.md

description:         Privacy-focused local text-to-speech reader using Piper

dependencies:
- base >= 4.7 && < 5
- text
- bytestring
- typed-process
- optparse-applicative
- req
- scalpel
- envparse
- filepath
- directory
- aeson
- transformers
- mtl

ghc-options:
- -Wall
- -Wcompat
- -Widentities
- -Wincomplete-record-updates
- -Wincomplete-uni-patterns
- -Wmissing-export-lists
- -Wmissing-home-modules
- -Wpartial-fields
- -Wredundant-constraints

library:
  source-dirs: src

executables:
  piper-reader:
    main:                Main.hs
    source-dirs:         app
    ghc-options:
    - -threaded
    - -rtsopts
    - -with-rtsopts=-N
    dependencies:
    - piper-reader
